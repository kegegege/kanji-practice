<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>漢字キャッチ！</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&family=DotGothic16&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-yellow: #FFE600;
      --neon-pink: #FF2D78;
      --neon-blue: #00C8FF;
      --neon-green: #00FF9C;
      --neon-orange: #FF8C00;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: 'Noto Sans JP', sans-serif;
      background: #0a0a1a;
      color: white;
    }

    /* STARS */
    #stars { position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(0,200,255,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(255,45,120,0.07) 0%, transparent 50%),
                  linear-gradient(180deg, #0a0a2e 0%, #0a0a1a 100%); }
    .star { position: absolute; border-radius: 50%; background: white;
      animation: twinkle var(--d) ease-in-out infinite alternate; }
    @keyframes twinkle { from{opacity:0.1;transform:scale(0.8)} to{opacity:0.9;transform:scale(1.2)} }

    /* LAYOUT */
    #app { position: relative; z-index: 1; width: 100%; height: 100vh; height: 100dvh;
           display: flex; flex-direction: column; }

    /* HEADER */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 10px;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .hdr-logo { font-family: 'DotGothic16', monospace; font-size: 22px;
      color: var(--neon-yellow); letter-spacing: 2px; }
    .hdr-logo span { color: var(--neon-pink); }
    .hdr-stats { display: flex; gap: 10px; }
    .stat-chip {
      display: flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.13);
      border-radius: 20px; padding: 4px 10px; font-size: 14px; font-weight: 700;
    }

    /* ARENA */
    #arena { flex: 1; position: relative; overflow: hidden; }

    /* COMBO BANNER */
    #combo-banner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-family: 'DotGothic16', monospace; font-size: 38px;
      color: var(--neon-yellow); text-shadow: 0 0 20px rgba(255,230,0,0.9);
      pointer-events: none; opacity: 0; z-index: 30; white-space: nowrap;
    }
    @keyframes comboPop {
      0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
      20%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
      60%{opacity:1;transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0;transform:translate(-50%,-60%) scale(0.9)}
    }

    /* FALLING KANJI */
    .kanji-drop {
      position: absolute; display: flex; flex-direction: column; align-items: center;
      z-index: 5; animation: fall linear forwards; will-change: transform;
    }
    .timer-bar-wrap { width: 90px; height: 5px; margin-bottom: 5px;
      background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .timer-bar-fill {
      height: 100%; width: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--neon-green), var(--neon-yellow), var(--neon-pink));
      transform-origin: left; animation: timerShrink 5s linear forwards;
    }
    @keyframes timerShrink { from{transform:scaleX(1)} to{transform:scaleX(0)} }

    .kanji-bubble {
      background: linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      border: 2px solid rgba(255,255,255,0.28);
      border-radius: 20px; padding: 14px 20px; text-align: center;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 24px rgba(255,230,0,0.18), inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .kanji-char {
      font-family: 'Kaisei Decol', serif; font-size: 56px; font-weight: 700;
      line-height: 1; color: white;
      text-shadow: 0 0 24px rgba(255,230,0,0.8), 0 0 48px rgba(255,230,0,0.3);
    }
    .kanji-deco { width: 44px; height: 2px; margin: 6px auto 0;
      background: linear-gradient(90deg, transparent, var(--neon-yellow), transparent); border-radius: 2px; }
    .kanji-hint { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 6px;
      max-width: 110px; text-align: center; line-height: 1.5; }

    .kanji-drop.shake { animation: fall linear forwards, shakeX 0.1s ease-in-out infinite; }
    @keyframes shakeX { 0%,100%{margin-left:0} 33%{margin-left:-5px} 66%{margin-left:5px} }

    @keyframes fall {
      from { transform: translateY(-160px); }
      to   { transform: translateY(var(--fall-to)); }
    }

    /* EXPLOSION */
    .explosion { position: absolute; pointer-events: none; z-index: 20; }
    .exp-ring {
      width: 110px; height: 110px; border-radius: 50%;
      border: 4px solid var(--neon-orange);
      box-shadow: 0 0 30px var(--neon-orange), 0 0 60px rgba(255,140,0,0.4);
      animation: ringOut 0.6s ease-out forwards;
    }
    @keyframes ringOut { 0%{transform:scale(0.4);opacity:1} 100%{transform:scale(2);opacity:0} }
    .exp-text {
      position: absolute; top: 25px; left: 0; right: 0; text-align: center;
      font-family: 'DotGothic16', monospace; font-size: 22px; color: var(--neon-orange);
      text-shadow: 0 0 10px var(--neon-orange);
      animation: textPop 0.7s ease-out forwards;
    }
    @keyframes textPop { 0%{opacity:1;transform:scale(0.5)} 50%{opacity:1;transform:scale(1.3)} 100%{opacity:0;transform:scale(1) translateY(-30px)} }
    .exp-spark {
      position: absolute; width: 8px; height: 8px; border-radius: 50%;
      animation: spark var(--sd) ease-out forwards;
    }
    @keyframes spark { from{transform:translate(51px,51px);opacity:1} to{transform:translate(var(--sx),var(--sy));opacity:0} }

    /* SCORE BURST */
    .score-burst {
      position: absolute; pointer-events: none; z-index: 25;
      font-family: 'DotGothic16', monospace; font-size: 24px; font-weight: 700;
      color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green);
      animation: burstFly 0.8s ease-out forwards;
    }
    @keyframes burstFly { from{opacity:1;transform:translateY(0) scale(0.8)} to{opacity:0;transform:translateY(-70px) scale(1.1)} }

    /* CHOICES */
    #choices-bar {
      flex-shrink: 0; padding: 10px 14px 18px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    #choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .choice-btn {
      padding: 15px 8px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      font-family: 'DotGothic16', monospace; font-size: 19px; color: white;
      cursor: pointer; text-align: center; transition: all 0.12s; line-height: 1.3;
    }
    .choice-btn:active:not(:disabled) { transform: scale(0.93); background: rgba(255,255,255,0.14); }
    .choice-btn.ok  { background: rgba(0,255,156,0.2); border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 16px rgba(0,255,156,0.35); }
    .choice-btn.ng  { background: rgba(255,45,120,0.2); border-color: var(--neon-pink); color: var(--neon-pink); }
    .choice-btn:disabled { opacity: 0.35; }

    /* OVERLAY SCREENS */
    .screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(5,5,22,0.96); backdrop-filter: blur(18px);
      padding: 28px 22px; text-align: center;
    }
    .screen.hidden { display: none; }

    .logo-text {
      font-family: 'DotGothic16', monospace; font-size: 58px; line-height: 1.1; margin-bottom: 6px;
      color: var(--neon-yellow);
      text-shadow: 0 0 20px rgba(255,230,0,0.6), 0 0 60px rgba(255,230,0,0.2);
      animation: logoPulse 2s ease-in-out infinite;
    }
    @keyframes logoPulse { 0%,100%{text-shadow:0 0 20px rgba(255,230,0,0.6)} 50%{text-shadow:0 0 40px rgba(255,230,0,1),0 0 80px rgba(255,230,0,0.4)} }
    .logo-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 36px; letter-spacing: 0.1em; }

    .q-label { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 10px; letter-spacing: 0.07em; }
    .pill-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
    .pill {
      padding: 9px 22px; background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.18); border-radius: 50px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 15px; color: rgba(255,255,255,0.65); cursor: pointer;
    }
    .pill.active { background: var(--neon-yellow); border-color: var(--neon-yellow); color: #0a0a1a; font-weight: 700; box-shadow: 0 0 18px rgba(255,230,0,0.45); }

    .big-btn {
      width: 100%; max-width: 320px; padding: 18px; border: none; border-radius: 18px;
      font-family: 'DotGothic16', monospace; font-size: 22px; cursor: pointer; letter-spacing: 0.06em;
      transition: transform 0.12s;
    }
    .big-btn:active { transform: scale(0.95); }
    .btn-yellow { background: var(--neon-yellow); color: #0a0a1a; box-shadow: 0 0 28px rgba(255,230,0,0.35), 0 6px 20px rgba(0,0,0,0.4); }
    .btn-pink { background: var(--neon-pink); color: white; box-shadow: 0 0 28px rgba(255,45,120,0.35), 0 6px 20px rgba(0,0,0,0.4); margin-top: 10px; }
    .btn-ghost { background: transparent; color: rgba(255,255,255,0.6); border: 1.5px solid rgba(255,255,255,0.2); margin-top: 10px; }

    .result-num { font-family: 'DotGothic16', monospace; font-size: 72px; color: var(--neon-yellow); line-height: 1; text-shadow: 0 0 30px rgba(255,230,0,0.7); }
    .result-unit { font-size: 13px; color: rgba(255,255,255,0.4); margin: 4px 0 16px; }
    .result-msg { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .result-sub { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 28px; }
    .stats-row { display: flex; gap: 12px; margin-bottom: 28px; width: 100%; max-width: 320px; }
    .sbox { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 12px 6px; }
    .sbox-val { font-family: 'DotGothic16', monospace; font-size: 26px; color: var(--neon-blue); }
    .sbox-lbl { font-size: 10px; color: rgba(255,255,255,0.38); margin-top: 2px; }

    .go-title { font-family: 'DotGothic16', monospace; font-size: 52px; color: var(--neon-pink);
      text-shadow: 0 0 30px rgba(255,45,120,0.8); animation: goFlash 0.4s ease-in-out infinite alternate; margin-bottom: 10px; }
    @keyframes goFlash { from{opacity:1} to{opacity:0.35} }

    /* FLASH OVERLAY */
    #dmg-flash { position: fixed; inset: 0; z-index: 90; pointer-events: none; opacity: 0; background: rgba(255,45,120,0.3); transition: opacity 0.1s; }

    /* UPLOAD SCREEN */
    #scr-upload { overflow-y: auto; justify-content: flex-start; padding-top: 24px; }
    .upload-title { font-family: 'DotGothic16', monospace; font-size: 26px; color: var(--neon-blue);
      text-shadow: 0 0 16px rgba(0,200,255,0.6); margin-bottom: 6px; }
    .upload-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 24px; max-width: 320px; line-height: 1.7; }
    .upload-zone {
      width: 100%; max-width: 320px;
      border: 2px dashed rgba(0,200,255,0.4); border-radius: 18px;
      padding: 28px 20px; cursor: pointer; transition: all 0.2s; margin-bottom: 16px;
      background: rgba(0,200,255,0.04);
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--neon-blue); background: rgba(0,200,255,0.1); }
    .upload-zone-icon { font-size: 40px; margin-bottom: 10px; }
    .upload-zone-txt { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.6; }
    .upload-zone-txt strong { color: var(--neon-blue); }
    #upload-preview-wrap { width: 100%; max-width: 320px; margin-bottom: 14px; display: none; }
    #upload-preview { width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); }
    #upload-status { min-height: 22px; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
    #upload-status.err { color: var(--neon-pink); }
    #upload-status.ok  { color: var(--neon-green); }
    .parsed-list { width: 100%; max-width: 320px; margin-bottom: 16px; text-align: left; }
    .parsed-list-title { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; letter-spacing: 0.06em; }
    .parsed-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 8px 12px; margin-bottom: 6px;
    }
    .parsed-kanji { font-family: 'Kaisei Decol', serif; font-size: 22px; color: white; min-width: 52px; }
    .parsed-hira  { font-size: 15px; color: var(--neon-blue); flex: 1; }
    .parsed-del   { background: none; border: none; color: rgba(255,255,255,0.25); font-size: 18px; cursor: pointer; padding: 0 4px; }
    .parsed-del:hover { color: var(--neon-pink); }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--neon-blue); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-blue { background: var(--neon-blue); color: #0a0a1a; box-shadow: 0 0 28px rgba(0,200,255,0.35); }
    #upload-file-input { display: none; }

    @media (min-width: 600px) {
      .kanji-char { font-size: 68px; }
      .choice-btn { font-size: 22px; padding: 18px 10px; }
      #choices-grid { gap: 12px; }
      .logo-text { font-size: 70px; }
    }
  </style>
</head>
<body>

<div id="stars"></div>
<div id="dmg-flash"></div>

<div id="app">
  <div id="header">
    <div class="hdr-logo">漢字<span>キャッチ</span>！</div>
    <div class="hdr-stats">
      <div class="stat-chip" id="lives-chip">❤️❤️❤️</div>
      <div class="stat-chip">⭐ <span id="score-disp">0</span></div>
      <div class="stat-chip">🔥 <span id="streak-disp">0</span></div>
    </div>
  </div>
  <div id="arena">
    <div id="combo-banner"></div>
  </div>
  <div id="choices-bar">
    <div id="choices-grid"></div>
  </div>
</div>

<!-- TITLE -->
<div id="scr-title" class="screen">
  <div class="logo-text">漢字<br>キャッチ！</div>
  <div class="logo-sub">KANJI READING GAME</div>
  <div class="q-label">もんだいのかず（Questions）</div>
  <div class="pill-row" id="q-pills">
    <button class="pill active" onclick="setQ(10,this)">10</button>
    <button class="pill" onclick="setQ(15,this)">15</button>
    <button class="pill" onclick="setQ(20,this)">20</button>
    <button class="pill" onclick="setQ(999,this)">∞</button>
  </div>
  <button class="big-btn btn-yellow" onclick="startGame()">▶ スタート！</button>
  <button class="big-btn btn-ghost" onclick="showScr('scr-upload')" style="margin-top:10px;">📷 問題をついか</button>
  <div id="weak-badge" style="margin-top:16px;font-size:12px;color:rgba(255,255,255,0.35);min-height:18px;"></div>
  <button onclick="resetStats()" style="margin-top:8px;background:none;border:none;color:rgba(255,255,255,0.22);font-size:11px;cursor:pointer;font-family:inherit;">成績リセット</button>
</div>

<!-- UPLOAD SCREEN -->
<div id="scr-upload" class="screen hidden">
  <div class="upload-title">📷 問題をついか</div>
  <div class="upload-sub">漢字プリントの写真をアップロードすると、AIが自動で問題を作ります。</div>

  <input type="file" id="upload-file-input" accept="image/*" onchange="onFileSelect(event)" />
  <div class="upload-zone" id="upload-zone"
    onclick="document.getElementById('upload-file-input').click()"
    ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
    <div class="upload-zone-icon">🖼️</div>
    <div class="upload-zone-txt">タップして写真をえらぶ<br><strong>または ここにドロップ</strong><br><span style="font-size:11px;opacity:0.6">JPG / PNG 対応</span></div>
  </div>

  <div id="upload-preview-wrap"><img id="upload-preview" /></div>
  <div id="upload-status"></div>

  <div class="parsed-list hidden" id="parsed-list">
    <div class="parsed-list-title">FOUND PAIRS — タップで削除</div>
    <div id="parsed-items"></div>
  </div>

  <button class="big-btn btn-blue" id="analyze-btn" onclick="analyzeImage()" style="display:none;margin-bottom:10px;">🔍 AIで解析する</button>
  <button class="big-btn btn-yellow" id="add-btn" onclick="addParsedPairs()" style="display:none;margin-bottom:10px;">✅ ゲームにくわえる</button>
  <button class="big-btn btn-ghost" onclick="showScr('scr-title')">← もどる</button>
</div>

<!-- RESULT -->
<div id="scr-result" class="screen hidden">
  <div class="result-num" id="r-score">0</div>
  <div class="result-unit">てん（points）</div>
  <div class="result-msg" id="r-msg"></div>
  <div class="result-sub" id="r-sub"></div>
  <div class="stats-row">
    <div class="sbox"><div class="sbox-val" id="r-correct">0</div><div class="sbox-lbl">⭕ せいかい</div></div>
    <div class="sbox"><div class="sbox-val" id="r-best">0</div><div class="sbox-lbl">🔥 最高コンボ</div></div>
    <div class="sbox"><div class="sbox-val" id="r-acc">0%</div><div class="sbox-lbl">📊 正解率</div></div>
  </div>
  <button class="big-btn btn-yellow" onclick="startGame()">もういちど！</button>
  <button class="big-btn btn-ghost" onclick="showScr('scr-title')">タイトルへ</button>
</div>

<!-- GAME OVER -->
<div id="scr-gameover" class="screen hidden">
  <div class="go-title">GAME<br>OVER</div>
  <div style="font-size:14px;color:rgba(255,255,255,0.45);margin-bottom:16px;">ライフがなくなった！</div>
  <div class="result-num" id="go-score">0</div>
  <div class="result-unit">てん</div>
  <div class="stats-row" style="margin-top:20px;">
    <div class="sbox"><div class="sbox-val" id="go-correct">0</div><div class="sbox-lbl">⭕ せいかい</div></div>
    <div class="sbox"><div class="sbox-val" id="go-best">0</div><div class="sbox-lbl">🔥 最高コンボ</div></div>
    <div class="sbox"><div class="sbox-val" id="go-acc">0%</div><div class="sbox-lbl">📊 正解率</div></div>
  </div>
  <button class="big-btn btn-pink" onclick="startGame()" style="margin-top:20px;">もういちど！</button>
  <button class="big-btn btn-ghost" onclick="showScr('scr-title')">タイトルへ</button>
</div>

<script>
/* ── STARS ── */
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
  starsEl.appendChild(s);
}

/* ── DATA ── */
let PAIRS = [
  {kanji:"宮城県",  hira:"みやぎけん",    hint:"宮城県のお祭り。"},
  {kanji:"山形県",  hira:"やまがたけん",   hint:"山形県のサクランボ。"},
  {kanji:"茨城県",  hira:"いばらきけん",   hint:"茨城県のメロン。"},
  {kanji:"栃木県",  hira:"とちぎけん",     hint:"栃木県のイチゴ。"},
  {kanji:"群馬県",  hira:"ぐんまけん",     hint:"群馬県のこんにゃく。"},
  {kanji:"埼玉県",  hira:"さいたまけん",   hint:"埼玉県の人口。"},
  {kanji:"神奈川県",hira:"かながわけん",   hint:"神奈川県にある港。"},
  {kanji:"新潟県",  hira:"にいがたけん",   hint:"新潟県のお米。"},
  {kanji:"富山県",  hira:"とやまけん",     hint:"富山県へ行く。"},
  {kanji:"福井県",  hira:"ふくいけん",     hint:"福井県のチューリップ。"},
  {kanji:"山梨県",  hira:"やまなしけん",   hint:"山梨県のブドウ。"},
  {kanji:"岐阜県",  hira:"ぎふけん",       hint:"岐阜県でくらす。"},

/* ── SOUND ENGINE (Web Audio API — no files needed) ── */
let _ctx = null;
function getCtx(){
  if(!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if(_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function playTone(freq, type, startVol, endVol, startT, dur){
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + startT);
  gain.gain.setValueAtTime(startVol, ctx.currentTime + startT);
  gain.gain.exponentialRampToValueAtTime(endVol, ctx.currentTime + startT + dur);
  osc.start(ctx.currentTime + startT);
  osc.stop(ctx.currentTime + startT + dur);
}
function playNoise(vol, dur, startT){
  const ctx = getCtx();
  const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const gain = ctx.createGain();
  const filt = ctx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=350; filt.Q.value=0.6;
  src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(vol, ctx.currentTime + startT);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startT + dur);
  src.start(ctx.currentTime + startT);
  src.stop(ctx.currentTime + startT + dur);
}
// ✅ 正解 — 明るい上昇アルペジオ
function soundCorrect(){
  [[523,0],[659,0.07],[784,0.14],[1047,0.21]].forEach(([f,t])=>playTone(f,'sine',0.22,0.001,t,0.18));
}
// 🔥 コンボ — さらに高く輝く
function soundCombo(){
  [[784,0],[988,0.06],[1175,0.12],[1568,0.18],[2093,0.26]].forEach(([f,t])=>playTone(f,'triangle',0.15,0.001,t,0.18));
}
// ❌ 不正解 — 低い二音下降
function soundWrong(){
  playTone(280,'sawtooth',0.18,0.001,0,0.12);
  playTone(200,'sawtooth',0.18,0.001,0.11,0.2);
}
// 💥 爆発 — ノイズ＋重低音
function soundExplode(){
  playNoise(0.38, 0.45, 0);
  playTone(80,'sine',0.4,0.001,0,0.4);
  playTone(55,'sine',0.22,0.001,0.06,0.35);
}
// ⚠️ 警告（シェイク時） — ビープ×3
function soundWarning(){
  [0, 0.12, 0.24].forEach(t=>playTone(480,'square',0.07,0.001,t,0.07));
}
// 💀 ゲームオーバー — 悲しい下降
function soundGameOver(){
  [[392,0],[349,0.18],[311,0.36],[261,0.58]].forEach(([f,t])=>playTone(f,'sawtooth',0.2,0.001,t,0.28));
}
// 🏆 クリア — ファンファーレ
function soundClear(){
  [[523,0],[523,0.1],[523,0.2],[415,0.12],[523,0.38],[659,0.54],[784,0.72]].forEach(([f,t])=>playTone(f,'sine',0.22,0.001,t,0.26));
}

/* ── STATE ── */
const FALL_SEC = 5;
let qCount=10, queue=[], qIdx=0, score=0, lives=3, streak=0, bestStreak=0, correct=0, total=0;
let currentPair=null, gameOn=false, dropEl=null, shakeTimer=null, endTimer=null;

/* ── MISTAKE MEMORY (persists across games, saved to localStorage) ── */
// stats[kanji] = { wrong: N, miss: N, right: N }
let stats = {};
function loadStats(){ try{ const s=localStorage.getItem('kanji_stats'); if(s) stats=JSON.parse(s); }catch(e){} }
function saveStats(){ try{ localStorage.setItem('kanji_stats', JSON.stringify(stats)); }catch(e){} }
function recordResult(kanji, outcome){ // outcome: 'right' | 'wrong' | 'miss'
  if(!stats[kanji]) stats[kanji]={wrong:0,miss:0,right:0};
  stats[kanji][outcome]++;
  saveStats();
}
function getWeight(pair){
  const s = stats[pair.kanji];
  if(!s) return 1; // 未出題は基本重み
  const errors = s.wrong + s.miss * 2; // 落下ミスは2倍ペナルティ
  const rights  = s.right;
  // 間違いが多いほど重みが大きい。正解を重ねると減っていく
  return Math.max(1, 1 + errors * 2 - rights);
}

/* 重み付きランダム選択 */
function weightedSample(pool, count){
  const weights = pool.map(p => getWeight(p));
  const result = [];
  const used = new Set();
  const total = weights.reduce((a,b)=>a+b, 0);
  const n = Math.min(count, pool.length);
  for(let i=0; i<n; i++){
    let rand = Math.random() * weights.filter((_,j)=>!used.has(j)).reduce((a,b)=>a+b,0);
    for(let j=0; j<pool.length; j++){
      if(used.has(j)) continue;
      rand -= weights[j];
      if(rand <= 0){ result.push(pool[j]); used.add(j); break; }
    }
    // fallback
    if(result.length < i+1){
      const rem = pool.findIndex((_,j)=>!used.has(j));
      if(rem>=0){ result.push(pool[rem]); used.add(rem); }
    }
  }
  return result;
}

/* ── HELPERS ── */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function showScr(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  const el=document.getElementById(id);if(el)el.classList.remove('hidden');
  if(id==='scr-title') updateWeakBadge();
}
function setQ(n,btn){qCount=n;document.querySelectorAll('#q-pills .pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function updateHUD(){
  const hearts=['❤️','❤️','❤️'];
  document.getElementById('lives-chip').textContent = lives>0 ? hearts.slice(0,lives).join('')+'💀'.repeat(0) : '💀';
  document.getElementById('score-disp').textContent=score;
  document.getElementById('streak-disp').textContent=streak;
}

/* ── START ── */
function startGame(){
  loadStats();
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById('arena').innerHTML='<div id="combo-banner"></div>';
  score=0;lives=3;streak=0;bestStreak=0;correct=0;total=0;currentPair=null;dropEl=null;gameOn=true;
  updateHUD();
  const cnt = qCount===999 ? PAIRS.length : Math.min(qCount, PAIRS.length);
  // 重み付きサンプリングで出題順を決定
  queue = weightedSample(PAIRS, cnt);
  qIdx=0;
  nextQ();
}

/* ── NEXT QUESTION ── */
function nextQ(){
  if(!gameOn) return;
  if(qIdx>=queue.length){endGame();return;}
  currentPair=queue[qIdx++];
  spawnDrop(currentPair);
  renderChoices(currentPair);
}

/* ── SPAWN ── */
function spawnDrop(pair){
  clearTimers();
  const arena=document.getElementById('arena');
  const aW=arena.clientWidth, aH=arena.clientHeight;
  const minX=16, maxX=aW-160;
  const x=Math.floor(Math.random()*(maxX-minX)+minX);

  dropEl=document.createElement('div');
  dropEl.className='kanji-drop';
  dropEl.id='drop';
  dropEl.style.cssText=`left:${x}px;--fall-to:${aH+20}px;animation-duration:${FALL_SEC}s;`;
  dropEl.innerHTML=`
    <div class="timer-bar-wrap"><div class="timer-bar-fill"></div></div>
    <div class="kanji-bubble">
      <div class="kanji-char">${pair.kanji}</div>
      <div class="kanji-deco"></div>
      <div class="kanji-hint">${pair.hint}</div>
    </div>`;
  arena.appendChild(dropEl);

  // shake warning at 1.5s before end
  shakeTimer=setTimeout(()=>{if(dropEl){dropEl.classList.add('shake');soundWarning();}},(FALL_SEC-1.5)*1000);

  // auto-explode when animation ends — only react to the drop itself, not child elements
  dropEl.addEventListener('animationend', function handler(e){
    if(e.target !== dropEl) return;
    dropEl.removeEventListener('animationend', handler);
    onMiss();
  });
}

function clearTimers(){
  clearTimeout(shakeTimer);
  clearTimeout(endTimer);
}

/* ── CHOICES ── */
function renderChoices(pair){
  const grid=document.getElementById('choices-grid');
  const wrongs=shuffle(PAIRS.filter(p=>p.hira!==pair.hira)).slice(0,3);
  const opts=shuffle([pair,...wrongs]);
  grid.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='choice-btn'; b.textContent=o.hira;
    b.onclick=()=>onAnswer(o.hira,pair.hira,b);
    grid.appendChild(b);
  });
}

/* ── ANSWER ── */
function onAnswer(chosen,correct_ans,btn){
  if(!gameOn||!currentPair) return;
  total++;
  disableChoices(true);

  if(chosen===correct_ans){
    btn.classList.add('ok');
    correct++;streak++;if(streak>bestStreak)bestStreak=streak;
    if(streak>=3) soundCombo(); else soundCorrect();
    recordResult(currentPair.kanji, 'right');

    // score: 100 base + time bonus + combo
    let bonus=0;
    if(dropEl){
      const anims=dropEl.getAnimations();
      if(anims.length){const p=anims[0].currentTime/(FALL_SEC*1000);bonus=Math.floor((1-p)*60);}
    }
    const combo=streak>=3?streak*10:0;
    const gained=100+bonus+combo;
    score+=gained;
    updateHUD();

    // score burst
    if(dropEl){const r=dropEl.getBoundingClientRect(),arenaR=document.getElementById('arena').getBoundingClientRect();
      showBurst(r.left-arenaR.left+60,r.top-arenaR.top+40,`+${gained}`);}
    if(streak>=3)showCombo(streak);

    // remove drop
    clearTimers();
    if(dropEl){dropEl.remove();dropEl=null;}

    endTimer=setTimeout(()=>{
      disableChoices(false);
      clearClasses();
      nextQ();
    },350);

  } else {
    btn.classList.add('ng');
    streak=0; updateHUD(); soundWrong();
    recordResult(currentPair.kanji, 'wrong');
    // show correct
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.textContent===correct_ans)b.classList.add('ok');});
    endTimer=setTimeout(()=>{disableChoices(false);clearClasses();},600);
  }
}

/* ── MISS (fell through) ── */
function onMiss(){
  if(!gameOn) return;
  const arena=document.getElementById('arena');
  const aW=arena.clientWidth;
  // explode at bottom
  explode(aW/2, arena.clientHeight-60); soundExplode();
  if(dropEl){dropEl.remove();dropEl=null;}
  clearTimers(); streak=0;
  if(currentPair) recordResult(currentPair.kanji, 'miss');
  loseLife();
}

/* ── LOSE LIFE ── */
function loseLife(){
  lives--;updateHUD();
  const f=document.getElementById('dmg-flash');
  f.style.opacity='1';setTimeout(()=>f.style.opacity='0',200);
  if(lives<=0){gameOn=false;soundGameOver();setTimeout(showGameOver,400);return;}
  disableChoices(false);clearClasses();
  setTimeout(nextQ,600);
}

/* ── EXPLOSION ── */
function explode(cx,cy){
  const arena=document.getElementById('arena');
  const e=document.createElement('div');
  e.className='explosion';
  e.style.cssText=`left:${cx-55}px;top:${cy-55}px;`;
  e.innerHTML=`<div class="exp-ring"></div><div class="exp-text">💥</div>`;
  const cols=['#FF8C00','#FFE600','#FF2D78','#FF4500'];
  for(let i=0;i<14;i++){
    const ang=(i/14)*Math.PI*2, dist=55+Math.random()*45;
    const sx=Math.cos(ang)*dist, sy=Math.sin(ang)*dist;
    const sp=document.createElement('div');sp.className='exp-spark';
    sp.style.cssText=`--sx:${sx}px;--sy:${sy}px;--sd:${0.3+Math.random()*0.3}s;left:51px;top:51px;background:${cols[i%cols.length]}`;
    e.appendChild(sp);
  }
  arena.appendChild(e);
  setTimeout(()=>e.remove(),800);
}

/* ── SCORE BURST ── */
function showBurst(x,y,txt){
  const arena=document.getElementById('arena');
  const b=document.createElement('div');b.className='score-burst';
  b.style.cssText=`left:${x}px;top:${y}px;`;b.textContent=txt;
  arena.appendChild(b);setTimeout(()=>b.remove(),900);
}

/* ── COMBO ── */
function showCombo(n){
  const el=document.getElementById('combo-banner');
  if(!el)return;
  el.textContent=`🔥 ${n}コンボ！`;
  el.style.animation='none';void el.offsetWidth;
  el.style.animation='comboPop 0.9s ease-out forwards';
}

/* ── END GAME ── */
function endGame(){
  gameOn=false;clearTimers(); soundClear();
  const pct=total>0?Math.round(correct/total*100):0;
  let msg='😢 もっとがんばろう！';
  if(pct>=90)msg='🏆 かんぺきです！すごい！';
  else if(pct>=70)msg='🎉 よくできました！';
  else if(pct>=50)msg='😊 いいですよ！';
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-msg').textContent=msg;
  document.getElementById('r-sub').textContent=`${queue.length}もんだい おわり！`;
  document.getElementById('r-correct').textContent=correct;
  document.getElementById('r-best').textContent=bestStreak;
  document.getElementById('r-acc').textContent=pct+'%';
  showScr('scr-result');
}

function showGameOver(){
  const pct=total>0?Math.round(correct/total*100):0;
  document.getElementById('go-score').textContent=score;
  document.getElementById('go-correct').textContent=correct;
  document.getElementById('go-best').textContent=bestStreak;
  document.getElementById('go-acc').textContent=pct+'%';
  showScr('scr-gameover');
}

function disableChoices(d){document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=d);}
function clearClasses(){document.querySelectorAll('.choice-btn').forEach(b=>{b.classList.remove('ok','ng');});}

function resetStats(){
  if(!confirm('成績をリセットしますか？')) return;
  stats={};
  try{ localStorage.removeItem('kanji_stats'); }catch(e){}
  updateWeakBadge();
}

function updateWeakBadge(){
  const badge = document.getElementById('weak-badge');
  if(!badge) return;
  const weak = PAIRS
    .map(p=>({ p, w: getWeight(p) }))
    .filter(x=>x.w > 2)
    .sort((a,b)=>b.w-a.w)
    .slice(0,4)
    .map(x=>x.p.kanji);
  badge.textContent = weak.length ? '🎯 苦手: ' + weak.join('・') : '';
}

/* ── UPLOAD & AI ANALYZE ── */
let uploadedImageB64 = null;
let uploadedMime = 'image/jpeg';
let parsedPairs = [];

// ▼▼▼ RenderにデプロイしたURLをここに入れてください ▼▼▼
const BACKEND_URL = 'https://YOUR-APP.onrender.com';
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

function onDragOver(e){ e.preventDefault(); document.getElementById('upload-zone').classList.add('drag-over'); }
function onDragLeave(){ document.getElementById('upload-zone').classList.remove('drag-over'); }
function onDrop(e){ e.preventDefault(); onDragLeave(); if(e.dataTransfer.files[0]) loadImageFile(e.dataTransfer.files[0]); }
function onFileSelect(e){ if(e.target.files[0]) loadImageFile(e.target.files[0]); }

function loadImageFile(file){
  uploadedMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    uploadedImageB64 = dataUrl.split(',')[1];
    const preview = document.getElementById('upload-preview');
    preview.src = dataUrl;
    document.getElementById('upload-preview-wrap').style.display = 'block';
    document.getElementById('analyze-btn').style.display = 'block';
    document.getElementById('add-btn').style.display = 'none';
    document.getElementById('parsed-list').classList.add('hidden');
    setUploadStatus('', '');
  };
  reader.readAsDataURL(file);
}

function setUploadStatus(msg, type){
  const el = document.getElementById('upload-status');
  el.className = type ? `${type}` : '';
  el.innerHTML = msg;
}

async function analyzeImage(){
  if(!uploadedImageB64){ setUploadStatus('⚠️ 画像をえらんでください。', 'err'); return; }

  document.getElementById('analyze-btn').disabled = true;
  setUploadStatus('<span class="spinner"></span>AIが解析中です…', '');

  try {
    const res = await fetch(`${BACKEND_URL}/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageB64: uploadedImageB64, mimeType: uploadedMime })
    });

    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err?.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const pairs = data.pairs;

    if(!Array.isArray(pairs) || pairs.length === 0) throw new Error('ペアが見つかりませんでした。');

    parsedPairs = pairs;
    renderParsedList();
    setUploadStatus(`✅ ${parsedPairs.length}件のペアが見つかりました！`, 'ok');
    document.getElementById('add-btn').style.display = 'block';

  } catch(e) {
    setUploadStatus(`❌ エラー: ${e.message}`, 'err');
  } finally {
    document.getElementById('analyze-btn').disabled = false;
  }
}

function renderParsedList(){
  const container = document.getElementById('parsed-items');
  container.innerHTML = '';
  parsedPairs.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'parsed-item';
    div.innerHTML = `
      <div class="parsed-kanji">${p.kanji}</div>
      <div class="parsed-hira">${p.hira}</div>
      <button class="parsed-del" onclick="removeParsed(${i})" title="削除">✕</button>`;
    container.appendChild(div);
  });
  document.getElementById('parsed-list').classList.remove('hidden');
}

function removeParsed(i){
  parsedPairs.splice(i, 1);
  if(parsedPairs.length === 0){
    document.getElementById('parsed-list').classList.add('hidden');
    document.getElementById('add-btn').style.display = 'none';
    setUploadStatus('', '');
  } else {
    renderParsedList();
    setUploadStatus(`✅ ${parsedPairs.length}件のペアが見つかりました！`, 'ok');
  }
}

function addParsedPairs(){
  if(parsedPairs.length === 0) return;
  // avoid duplicates by kanji key
  const existing = new Set(PAIRS.map(p=>p.kanji));
  let added = 0;
  parsedPairs.forEach(p => {
    if(!existing.has(p.kanji)){
      PAIRS.push({ kanji: p.kanji, hira: p.hira, hint: p.hint || `${p.kanji}の読み方。` });
      existing.add(p.kanji);
      added++;
    }
  });
  // save to localStorage
  try{ localStorage.setItem('kanji_custom', JSON.stringify(PAIRS)); }catch(e){}
  showScr('scr-title');
  setUploadStatus('', '');
  // brief green flash on title
  const badge = document.getElementById('weak-badge');
  if(badge){ badge.style.color='var(--neon-green)'; badge.textContent=`＋${added}件の問題をついか！`; setTimeout(updateWeakBadge, 2500); }
}

function loadCustomPairs(){
  try{
    const saved = localStorage.getItem('kanji_custom');
    if(saved){
      const arr = JSON.parse(saved);
      if(Array.isArray(arr) && arr.length > 0) PAIRS = arr;
    }
  }catch(e){}
}

/* INIT */
document.addEventListener('touchstart', ()=>getCtx(), {once:true});
document.addEventListener('mousedown',  ()=>getCtx(), {once:true});
loadCustomPairs();
loadStats();
updateWeakBadge();
showScr('scr-title');
</script>
